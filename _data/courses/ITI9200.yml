title: "ITI9200 - Introduction to Category Theory"
course_code: ITI9200
term: "Spring 2026"
subtitle: "" #"The course is divided in two tracks: A (math) and B (CS)"
description: |
  An introductory course on <a href="https://ncatlab.org/nlab/show/category+theory">category theory</a> and its applications; runs at <em>Tallinn University of Technology</em> during the second semester (*January* to *May*) of each academic year.

# **Track A** is more geared towards Mathematics, **track B** towards computer science.

