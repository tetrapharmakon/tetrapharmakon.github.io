exercises:
  exam: |
    Through the course (more or less every other week) I will publish a document with 3-4 exercises; you have until the next sheet to solve them. They are part of you final grade. Deadlines are flexible; if the only problem is that you need more time, just tell me.
    - Sheet 1 [PDF](stuff/iti9200/sheet_01.pdf) (Deadline: Feb 26, 2026)
    - Sheet 2 [PDF](stuff/iti9200/sheet_02.pdf) (Deadline: Mar 19, 2026)
    - Sheet 3 [PDF](stuff/iti9200/sheet_03.pdf) (Deadline: Apr 16, 2026)
    - Sheet 4 [PDF](stuff/iti9200/sheet_04.pdf) (Deadline: TBA)
    - Sheet 5 [PDF](stuff/iti9200/sheet_05.pdf) (Deadline: TBA)
  mind: |
    - [Spiritual exercises](https://en.wikipedia.org/wiki/Spiritual_Exercises) ([link](https://tetrapharmakon.github.io/stuff/iti9200/conceptual_napkin.pdf)). 
    
    <b>Warning</b>: this set of exercises is not meant as part of the course, its content is extremely volatile in some parts, and it is usually addressed to people who already have a decent mathematical exposition. 
    
    The chapter may cause serious damage to the unwary and/or unprepared reader (implying such damage has not already been caused by the lectures...).

grading: |
  Your final grade will be determined based on how well you perform on the exercise sheets handed through the course, and a final oral exam. No one stops you from using a robot to learn; [embrace the future](https://www.youtube.com/watch?v=-aMvLtBvKAQ). But: we are going to have a problem if you come at the whiteboard clueless on how to solve the exercises "you" did.
  
  For the final exam, you can choose a topic from a list, and give a (~30 min+questions) presentation about it. It can relate category theory to whatever you like (one year the link was "monads in functional programming" + [supercollider](https://supercollider.github.io/), I dare you to do something cooler than that).

  ⚠️*NEW*⚠️ A list of possible exam topics: (legend: BCT = Leinster's book; CTCtx = Riehl; CTCS = Barr-Wells; ACC = Adámek-Herrlich-Strecker; CT = Awodey).

  - Basic results:
    - **Free objects as left adjoints, with applications to algebra: free monoids, free groups, free modules.**
      (BCT: pp 19-20 and 43-50; CTCtx: pp 129-136; CTCS: pp 347-350; ACC: pp 135-139; CT: pp 18-28)
    - **Cartesian closed categories: products, exponentials, and proofs-as-morphisms.**
      (BCT: pp. 164–167; CTCtx: pp. 129–131; CTCS: pp. 195–218; ACC: pp. 428–441; CT: pp. 122–146)
    - **Monads and Kleisli categories: partiality, exceptions, nondeterminism, state, input/output.**
      (BCT: p. 173; CTCtx: pp. 153–188; CTCS: pp. 372–376; ACC: pp. 316–348; CT: pp. 253–277)
    - **The Yoneda lemma, with applications to algebraic structures and representation problems.**
      (BCT: pp. 93–99; CTCtx: pp. 55–61; CTCS: pp. 121–126; ACC: p. 84; CT: pp. 188–193)
    - **Limits and colimits in algebra: products, coproducts, equalizers, quotients, tensor products, presentations by generators and relations.**
      (BCT: pp. 107–140; CTCtx: pp. 73–114; CTCS: pp. 153–194, 265–298; ACC: pp. 188–205; CT: pp. 89–118)

  - Intermediate/hard results:
    - **Monadicity and universal algebra: algebraic categories as categories of algebras for monads.**
      (CTCtx: pp. 177–188; CTCS: pp. 372–382; ACC: pp. 316–348, 403–406; CT: pp. 253–277)
    - **Stone duality and classical propositional logic: Boolean algebras, ultrafilters, and Stone spaces.**
      (ACC: pp. 29,35; CT: pp. 129–140)
    - **Initial algebras and final coalgebras: datatypes, recursion, streams, automata, and coinduction.**
      (BCT: pp ...; CTCtx: p. 44; CTCS: section 4.7; ACC: pp. 117-120; CT: section 10.5)
    - **Freyd's adjoint functor theorem.**
      (CTCtx: Theorem 4.6,3, what follows and what precedes; ACC: pp. 299--; CT: section 9.8)
    - **Grothendieck constructions and fibrations: indexed categories, families of structures, and dependent types.**
      (CTCtx: section 2.4; CTCS: pp. 327–346; ACC: p. 349-380; CT: section 8.4)

  - A list of interesting papers doing interesting things:
    - Philip Wadler, "Theorems for Free!"
    - Eugenio Moggi, "Notions of Computation and Monads" [(LINK)](https://www.cs.cmu.edu/~crary/819-f09/Moggi91.pdf)
    - Bart Jacobs, "Bases as coalgebras" [(LINK)](https://arxiv.org/pdf/1309.0844)
    - RFC Walters, "A note on context-free languages", [(LINK)](stuff/iti9200/papers/walters.pdf)
    - Marcelo Fiore, Tom Leinster, "Objects of Categories as Complex Numbers" [(LINK)]([(LINK)](https://arxiv.org/pdf/1309.0844)
    - Bill Lawvere, "Quantifiers and Sheaves" [(LINK)](https://lawverearchives.com/wp-content/uploads/2024/12/1970-quantifiers-and-sheaves.pdf)
    - Bill Lawvere, "Diagonal Arguments and Cartesian Closed Categories" [(LINK)](http://www.tac.mta.ca/tac/reprints/articles/15/tr15.pdf)
    - Bill Lawvere, "An elementary theory of the category of sets" [(LINK)](http://www.tac.mta.ca/tac/reprints/articles/11/tr11.pdf)
    - Bill Lawvere, "Categorical Dynamics" [(LINK)](https://lawverearchives.com/wp-content/uploads/2024/12/1978-categorical-dynamics.pdf)
    - Bill Lawvere, "Categories in continuum physics" [(LINK)](https://lawverearchives.com/wp-content/uploads/2024/12/1982-introduction-to-categories-in-continuum-physics.pdf)
    - Bill Lawvere, "Display of Graphics and Their Applications Exemplified by 2-Categories and the Hegelian <<Taco>>" [(LINK)](https://lawverearchives.com/wp-content/uploads/2024/12/1989-display-of-graphics-and-their-applications-exemplifed-by-2-categories-and-the-hegelian-taco.pdf)
    - Bill Lawvere, "Unity and identity of opposites in calculus and physics" [(LINK)](https://lawverearchives.com/wp-content/uploads/2024/12/1996-unity-and-identity-of-opposites-in-calculus-and-physics.pdf)
    - Bill Lawvere, "Kinship and mathematical categories" [(LINK)](https://lawverearchives.com/wp-content/uploads/2024/12/1999-kinship-and-mathematical-categories.pdf)
    - Bill Lawvere, "Introduction to Toposes, Algebraic Geometry and Logic" [(LINK)](https://lawverearchives.com/wp-content/uploads/2024/12/1971-introduction-to-toposes-algebraic-geometry-and-logic.pdf)
    - More in general, all that appears in the [Lawvere Archives](https://lawverearchives.com/work/).
    - the wikipedia page "timeline of category theory and related mathematics" [https://en.wikipedia.org/wiki/Timeline_of_category_theory_and_related_mathematics](https://en.wikipedia.org/wiki/Timeline_of_category_theory_and_related_mathematics)
    - You can also consult my page on [projects for students](https://tetrapharmakon.github.io/projects_4_students.html)


